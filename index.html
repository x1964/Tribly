<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tribly | شبكة تواصل تتفتح</title>

    <!-- SEO Essentials -->
    <meta name="description" content="Tribly - منصة التواصل الاجتماعي النابضة بالحياة. انضم إلى تجربة جديدة حيث يلتقي الإبداع بالمجتمع.">
    <meta name="keywords" content="Tribly, تريبلي, تواصل اجتماعي, شبكة جديدة, مجتمع مرئي">
    <meta name="author" content="Tribly">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Tribly - حيث تنمو العلاقات">
    <meta property="og:description" content="منصة التواصل الاجتماعي بتجربة بصرية استثنائية. انضم الآن!">
    <meta property="og:image" content="https://triblyapp.infinityfreeapp.com/maskable_icon%20(2).png">
    <meta property="og:locale" content="ar_EG">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tribly - شبكة التواصل المتجددة">

    <!-- Canonical -->
    <link rel="canonical" href="https://triblyapp.infinityfreeapp.com/">
    <link rel="icon" type="image/png" href="maskable_icon (2).png">

    <!-- Google Fonts + modern system font fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* smoother for animation focus */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0a1f1a, #05100c);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated organic blob background */
        .blob-bg {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 40% 50%, rgba(46, 204, 113, 0.08), transparent 70%);
            filter: blur(70px);
            animation: driftBlob 18s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes driftBlob {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.5; }
            100% { transform: translate(5%, -8%) scale(1.2); opacity: 0.9; }
        }

        /* main glass-card container */
        .portal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 560px;
            background: rgba(10, 30, 20, 0.38);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(46, 204, 113, 0.25);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(46, 204, 113, 0.2) inset;
            padding: 2rem 1.8rem 2.8rem;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: floatCard 1.2s ease-out;
        }

        @keyframes floatCard {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); backdrop-filter: blur(0px);}
            100% { opacity: 1; transform: translateY(0) scale(1); backdrop-filter: blur(16px);}
        }

        /* Kinetic emblem */
        .emblem {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .kinetic-flower {
            width: 100px;
            height: 100px;
            position: relative;
            animation: gentleSpin 18s infinite linear;
        }

        .petal {
            position: absolute;
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #2ecc71, #1f8a4c);
            border-radius: 70% 30% 60% 40% / 45% 40% 60% 55%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), 0 0 12px rgba(46,204,113,0.6);
            transition: all 0.2s ease;
        }

        .petal-1 { top: 0; left: 27px; transform: rotate(0deg); }
        .petal-2 { top: 27px; right: 0; transform: rotate(90deg); }
        .petal-3 { bottom: 0; left: 27px; transform: rotate(180deg); }
        .petal-4 { top: 27px; left: 0; transform: rotate(270deg); }
        .core {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #f5e7d3, #e0cba0);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(46,204,113,0.8);
            border: 2px solid rgba(255,245,200,0.6);
        }

        @keyframes gentleSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* main title */
        .brand-title {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .brand-title h1 {
            font-size: 3.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E9F7E1, #A3E4B0, #2ecc71);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation: textGlow 3s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 2px rgba(46,204,113,0.3);}
            100% { text-shadow: 0 0 12px rgba(46,204,113,0.6);}
        }

        .tagline-ar {
            font-size: 0.95rem;
            color: #cfe8cf;
            letter-spacing: 1px;
            font-weight: 400;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* dynamic description */
        .dynamic-desc {
            margin: 1.8rem 0 1.5rem;
            text-align: center;
            color: #d9f0da;
            font-weight: 300;
            line-height: 1.65;
            font-size: 1rem;
            border-right: 2px solid #2ecc71;
            padding-right: 1rem;
            border-left: 2px solid transparent;
        }

        /* stats row modern */
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 60px;
            padding: 0.6rem 1.4rem;
            margin: 2rem 0 1.8rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(46,204,113,0.3);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #eefbdf, #9bdc8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b9e3b0;
        }

        /* call to action button (new vibe) */
        .cta-group {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .enter-btn {
            background: linear-gradient(115deg, #1f8a4c, #2ecc71);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #021507;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 15px 25px -12px rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .enter-btn svg {
            transition: transform 0.3s ease;
        }

        .enter-btn:hover {
            transform: scale(1.04);
            background: linear-gradient(115deg, #2ecc71, #3ae282);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
            gap: 14px;
        }

        .enter-btn:hover svg {
            transform: translateX(5px);
        }

        /* particle wave canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* floating orbs (modern) */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(46,204,113,0.25), rgba(0,0,0,0));
            filter: blur(28px);
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 12s infinite alternate;
        }

        @keyframes orbFloat {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-50px) translateX(30px) scale(1.3); opacity: 0.7; }
        }

        /* responsive touch */
        @media (max-width: 500px) {
            .portal { padding: 1.5rem; }
            .brand-title h1 { font-size: 2.6rem; }
            .stat-number { font-size: 1.4rem; }
            .enter-btn { padding: 0.7rem 1.8rem; font-size: 1rem; }
        }

        /* hidden class for loader feel */
        .glow-transition {
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <!-- abstract organic orbs -->
    <div class="orb" style="width: 300px; height: 300px; top: -80px; left: -100px;"></div>
    <div class="orb" style="width: 450px; height: 450px; bottom: -150px; right: -120px; animation-duration: 18s;"></div>
    <div class="orb" style="width: 200px; height: 200px; top: 40%; right: 10%; animation-duration: 14s; filter: blur(40px);"></div>

    <div class="blob-bg"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="portal">
        <!-- Kinetic emblem - fresh organic motion -->
        <div class="emblem">
            <div class="kinetic-flower">
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
                <div class="core"></div>
            </div>
        </div>

        <!-- Brand new name + tagline -->
        <div class="brand-title">
            <h1>Tribly</h1>
            <div class="tagline-ar">شبكة تواصل تتفتح معك</div>
        </div>

        <!-- dynamic description that changes subtly? but elegant -->
        <div class="dynamic-desc" id="dynamicMessage">
            مساحة تفاعلية حيث الأفكار تنمو والأصدقاء يلتقون. مجتمع نابض بالحيوية، مصمم لأجلك.
        </div>

        <!-- modern stats mock (interactive fresh look) -->
        <div class="stats-row">
            <div class="stat">
                <div class="stat-number" id="statMembers">+12.4k</div>
                <div class="stat-label">أعضاء نشطاء</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="statPosts">+8.2k</div>
                <div class="stat-label">محادثات يومية</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="statGrowth">+34%</div>
                <div class="stat-label">نمو شهري</div>
            </div>
        </div>

        <!-- New call to action with modern animation -->
        <div class="cta-group">
            <button class="enter-btn" id="enterButton">
                <span>انطلق إلى تريبلي</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div style="text-align: center; margin-top: 1.2rem; font-size: 0.7rem; color: #7c9a76; letter-spacing: 1px;">
            انضم إلى تجربة بصرية غير تقليدية
        </div>
    </div>

    <script>
        (function() {
            // ========== 1. Particle network + waves (modern tech vibe) ==========
            const canvas = document.getElementById('particleCanvas');
            let ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 70;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 3 + 1.2,
                        alpha: Math.random() * 0.5 + 0.2,
                        vx: (Math.random() - 0.5) * 0.35,
                        vy: (Math.random() - 0.5) * 0.2 + (Math.random() > 0.7 ? -0.2 : 0.1),
                        pulse: Math.random() * Math.PI * 2,
                    });
                }
            }

            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                // draw connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(70, 210, 120, ${0.12 * (1 - dist / 100)})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                // draw particles with glow
                for (let p of particles) {
                    ctx.beginPath();
                    const glow = 0.4 + Math.sin(Date.now() * 0.002 + p.pulse) * 0.2;
                    ctx.arc(p.x, p.y, p.radius + 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(80, 220, 120, ${p.alpha * (0.6 + glow * 0.4)})`;
                    ctx.fill();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = '#2ecc71';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 255, 180, 0.9)`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function updateParticles() {
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -10) p.x = width + 10;
                    if (p.x > width + 10) p.x = -10;
                    if (p.y < -10) p.y = height + 10;
                    if (p.y > height + 10) p.y = -10;
                    p.pulse += 0.02;
                }
                drawParticles();
                requestAnimationFrame(updateParticles);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            resizeCanvas();
            updateParticles();

            // ========== 2. Dynamic counter animation on visible (modern micro-interaction) ==========
            const statNumbers = [
                { element: document.getElementById('statMembers'), targetVal: 12400, suffix: '+', isFloat: false, current: 0, formatted: '12.4k' },
                { element: document.getElementById('statPosts'), targetVal: 8200, suffix: '+', isFloat: false, current: 0, formatted: '8.2k' },
                { element: document.getElementById('statGrowth'), targetVal: 34, suffix: '%', isFloat: false, current: 0, formatted: '34%' }
            ];

            function animateStats() {
                statNumbers.forEach(stat => {
                    let target = stat.targetVal;
                    let duration = 1800;
                    let start = 0;
                    let stepTime = 20;
                    let steps = duration / stepTime;
                    let increment = target / steps;
                    let currentVal = 0;
                    let interval = setInterval(() => {
                        currentVal += increment;
                        if (currentVal >= target) {
                            currentVal = target;
                            if (stat.element) {
                                if (stat.targetVal === 12400) stat.element.innerText = '12.4k+';
                                else if (stat.targetVal === 8200) stat.element.innerText = '8.2k+';
                                else stat.element.innerText = Math.floor(currentVal) + stat.suffix;
                            }
                            clearInterval(interval);
                        } else {
                            if (stat.targetVal === 12400) stat.element.innerText = (currentVal / 1000).toFixed(1) + 'k+';
                            else if (stat.targetVal === 8200) stat.element.innerText = (currentVal / 1000).toFixed(1) + 'k+';
                            else stat.element.innerText = Math.floor(currentVal) + stat.suffix;
                        }
                    }, stepTime);
                });
            }

            // trigger after page load
            setTimeout(() => { animateStats(); }, 600);

            // ========== 3. Dynamic rotating message every 3 seconds (fresh text) ==========
            const messages = [
                "✨ مساحة جديدة من الإبداع والتواصل الصافي.",
                "🌿 حيث كل تفاعل يزهر بمعنى حقيقي.",
                "🚀 انطلق مع مجتمع يواكب رؤيتك.",
                "💬 تواصل بلا حواجب.. تجربة Tribly الفريدة.",
                "🎨 صمم حضورك الرقمي بأسلوب مختلف."
            ];
            let msgIndex = 0;
            const msgDiv = document.getElementById('dynamicMessage');
            if (msgDiv) {
                setInterval(() => {
                    msgIndex = (msgIndex + 1) % messages.length;
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        msgDiv.innerText = messages[msgIndex];
                        msgDiv.style.transition = 'opacity 0.35s ease';
                        msgDiv.style.opacity = '1';
                    }, 180);
                }, 3800);
            }

            // ========== 4. Button action + ripple effect and redirect (new elegant) ==========
            const enterBtn = document.getElementById('enterButton');
            if (enterBtn) {
                enterBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // create cool ripple effect
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple-effect');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.backgroundColor = 'rgba(255,255,200,0.6)';
                    ripple.style.width = '10px';
                    ripple.style.height = '10px';
                    ripple.style.transform = 'scale(1)';
                    ripple.style.transition = 'transform 0.5s ease-out, opacity 0.6s';
                    ripple.style.opacity = '1';
                    ripple.style.pointerEvents = 'none';
                    const rect = enterBtn.getBoundingClientRect();
                    ripple.style.left = `${rect.left + rect.width/2 - 5}px`;
                    ripple.style.top = `${rect.top + rect.height/2 - 5}px`;
                    ripple.style.position = 'fixed';
                    ripple.style.zIndex = '999';
                    document.body.appendChild(ripple);
                    setTimeout(() => {
                        ripple.style.transform = 'scale(70)';
                        ripple.style.opacity = '0';
                    }, 10);
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);

                    // update button text for micro feedback
                    const originalText = enterBtn.innerHTML;
                    enterBtn.innerHTML = `<span>جاري التوجيه...</span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 8v4l3 3"/></svg>`;
                    enterBtn.disabled = true;

                    setTimeout(() => {
                        window.location.replace("https://triblyapp.infinityfreeapp.com/");
                    }, 1100);
                });
            }

            // additional floating particle effect – small leaf like particles (dynamic)
            function addFloatingLeaves() {
                const leafContainer = document.createElement('div');
                leafContainer.style.position = 'fixed';
                leafContainer.style.top = 0;
                leafContainer.style.left = 0;
                leafContainer.style.width = '100%';
                leafContainer.style.height = '100%';
                leafContainer.style.pointerEvents = 'none';
                leafContainer.style.zIndex = '2';
                document.body.appendChild(leafContainer);
                for (let i = 0; i < 18; i++) {
                    let leaf = document.createElement('div');
                    leaf.style.position = 'absolute';
                    leaf.style.width = Math.random() * 8 + 4 + 'px';
                    leaf.style.height = Math.random() * 8 + 4 + 'px';
                    leaf.style.background = `rgba(80, 210, 100, ${Math.random() * 0.4 + 0.2})`;
                    leaf.style.borderRadius = '80% 0 70% 20%';
                    leaf.style.transform = `rotate(${Math.random() * 360}deg)`;
                    leaf.style.left = Math.random() * 100 + '%';
                    leaf.style.top = Math.random() * 100 + '%';
                    leaf.style.animation = `floatLeaf ${Math.random() * 8 + 6}s linear infinite`;
                    leaf.style.opacity = '0.5';
                    leaf.style.filter = 'blur(1px)';
                    leafContainer.appendChild(leaf);
                }
                const styleSheet = document.createElement("style");
                styleSheet.textContent = `
                    @keyframes floatLeaf {
                        0% { transform: translateY(0vh) rotate(0deg); opacity: 0.3; }
                        100% { transform: translateY(-120vh) rotate(380deg); opacity: 0; }
                    }
                `;
                document.head.appendChild(styleSheet);
            }
            addFloatingLeaves();

            // Additional floating stats pulse
            const statsRowDiv = document.querySelector('.stats-row');
            if(statsRowDiv) {
                setInterval(() => {
                    statsRowDiv.style.transition = 'box-shadow 0.25s';
                    statsRowDiv.style.boxShadow = '0 0 12px rgba(46,204,113,0.5)';
                    setTimeout(() => {
                        statsRowDiv.style.boxShadow = '0 0 0px rgba(46,204,113,0.2)';
                    }, 400);
                }, 4200);
            }

        })();
    </script>
    <style>
        .ripple-effect {
            pointer-events: none;
            will-change: transform;
        }
        .enter-btn {
            position: relative;
            overflow: hidden;
        }
        #dynamicMessage {
            transition: opacity 0.3s ease;
        }
        .kinetic-flower .petal {
            transition: all 0.2s;
        }
        .kinetic-flower:hover .petal {
            filter: brightness(1.1);
            box-shadow: 0 0 18px #2ecc71;
        }
    </style>
</body>
</html>
