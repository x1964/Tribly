    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #e8f5e9 50%, #c8e6c9 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated blob background */
        .blob-bg {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 40% 50%, rgba(76, 175, 80, 0.2), rgba(46, 125, 50, 0.08) 70%);
            filter: blur(80px);
            animation: driftBlob 20s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes driftBlob {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.5; }
            100% { transform: translate(5%, -8%) scale(1.2); opacity: 0.9; }
        }

        /* Main glass-card container */
        .portal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(16px);
            border-radius: 3.5rem;
            border: 1px solid rgba(76, 175, 80, 0.35);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1), 0 0 0 0.5px rgba(76, 175, 80, 0.2) inset;
            padding: 2.2rem 2rem 3rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: floatCard 0.8s ease-out;
        }

        .portal:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.15);
        }

        @keyframes floatCard {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); backdrop-filter: blur(0px);}
            100% { opacity: 1; transform: translateY(0) scale(1); backdrop-filter: blur(16px);}
        }

        /* Logo styling */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            position: relative;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(76,175,80,0.2), transparent 70%);
            border-radius: 50%;
            animation: pulseRing 2s infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .logo-wrapper img {
            border-radius: 25px;
            position: relative;
            z-index: 1;
        }

        .main-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.5)) drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            animation: logoGlowPulse 2.5s infinite alternate;
        }

        @keyframes logoGlowPulse {
            0% { filter: drop-shadow(0 0 5px rgba(76, 175, 80, 0.4)) drop-shadow(0 2px 5px rgba(0,0,0,0.1)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 22px rgba(76, 175, 80, 0.8)) drop-shadow(0 5px 12px rgba(0,0,0,0.2)); transform: scale(1.02); }
        }

        .main-logo:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 28px rgba(76, 175, 80, 1));
        }

        /* Brand title */
        .brand-title {
            text-align: center;
            margin-bottom: 1rem;
        }

        .brand-title h1 {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1b5e20, #4caf50, #81c784);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: textGreenShimmer 3s infinite alternate;
        }

        @keyframes textGreenShimmer {
            0% { filter: brightness(1); text-shadow: 0 0 3px rgba(76,175,80,0.2);}
            100% { filter: brightness(1.05); text-shadow: 0 0 15px rgba(76,175,80,0.5);}
        }

        .tagline-ar {
            font-size: 1rem;
            color: #2e7d32;
            letter-spacing: 1px;
            font-weight: 600;
            background: rgba(76, 175, 80, 0.12);
            display: inline-block;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        /* Dynamic description */
        .dynamic-desc {
            margin: 1.8rem 0 1.8rem;
            text-align: center;
            color: #1b5e20;
            font-weight: 500;
            line-height: 1.7;
            font-size: 1.05rem;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.08), rgba(129, 199, 132, 0.05));
            border-radius: 24px;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(76, 175, 80, 0.2);
            transition: all 0.3s ease;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 80px;
            padding: 0.8rem 1.6rem;
            margin: 2rem 0 2rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(76, 175, 80, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .stat {
            text-align: center;
            flex: 1;
            cursor: default;
            transition: transform 0.2s ease;
        }

        .stat:hover {
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32, #4caf50, #66bb6a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            transition: all 0.2s ease;
        }

        .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2e7d32;
            font-weight: 700;
            margin-top: 4px;
        }

        /* CTA Button */
        .cta-group {
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .enter-btn {
            background: linear-gradient(115deg, #2e7d32, #4caf50);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.25);
            font-family: inherit;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .enter-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .enter-btn svg {
            transition: transform 0.3s ease;
            stroke: white;
            stroke-width: 2;
        }

        .enter-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(115deg, #388e3c, #66bb6a);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            gap: 16px;
        }

        .enter-btn:hover svg {
            transform: translateX(5px);
        }

        /* Canvas particles */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(76, 175, 80, 0.18), rgba(46, 125, 50, 0.08));
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 14s infinite alternate;
        }

        @keyframes orbFloat {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-60px) translateX(40px) scale(1.2); opacity: 0.7; }
        }

        /* Mouse follower effect */
        .mouse-light {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: transform 0.1s ease;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .portal { padding: 1.6rem; }
            .brand-title h1 { font-size: 2.8rem; }
            .stat-number { font-size: 1.6rem; }
            .enter-btn { padding: 0.8rem 1.8rem; font-size: 1rem; gap: 8px; }
            .main-logo { width: 80px; height: 80px; }
            .dynamic-desc { font-size: 0.9rem; padding: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- Decorative orbs -->
    <div class="orb" style="width: 300px; height: 300px; top: -80px; left: -100px;"></div>
    <div class="orb" style="width: 550px; height: 550px; bottom: -250px; right: -180px; animation-duration: 18s; background: radial-gradient(circle, rgba(76,175,80,0.15), rgba(46,125,50,0.08));"></div>
    <div class="orb" style="width: 250px; height: 250px; top: 50%; right: -50px; animation-duration: 15s;"></div>

    <div class="blob-bg"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="mouse-light" id="mouseLight"></div>

    <div class="portal" id="portalCard">
        <div class="logo-wrapper">
            <img src="maskable_icon (2).png" alt="Tribly Logo" class="main-logo" onerror="this.src='https://triblyapp.infinityfreeapp.com/maskable_icon%20(2).png'; this.onerror=null;">
        </div>

        <div class="brand-title">
            <h1>Tribly</h1>
            <div class="tagline-ar">تواصل بسهولة وبخصوصية</div>
        </div>

        <div class="dynamic-desc" id="dynamicMessage">
            🌟 مساحة تفاعلية حيث الأفكار تنمو والأصدقاء يلتقون. مجتمع نابض بالحيوية، مصمم لأجلك.
        </div>

        <div class="cta-group">
            <button class="enter-btn" id="enterButton">
                <span>انطلق إلى تريبلي</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div style="text-align: center; margin-top: 1.2rem; font-size: 0.7rem; color: #4caf50; letter-spacing: 1px; opacity: 0.8;">
            ✨ اكتشف مجتمع نشط ومليء بالتجارب الجديدة ✨
        </div>
    </div>

    <script>
        (function() {
            // Advanced Particle System with Mouse Interaction
            const canvas = document.getElementById('particleCanvas');
            let ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let mouseX = 0, mouseY = 0;
            const PARTICLE_COUNT = 100;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 4 + 1.5,
                        alpha: Math.random() * 0.5 + 0.3,
                        vx: (Math.random() - 0.5) * 0.25,
                        vy: (Math.random() - 0.5) * 0.2,
                        pulse: Math.random() * Math.PI * 2,
                        pulseSpeed: 0.01 + Math.random() * 0.02,
                        color: Math.random() > 0.7 ? '#4caf50' : '#81c784'
                    });
                }
            }

            // Mouse move tracking
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;

                // Mouse light effect
                const light = document.getElementById('mouseLight');
                if (light) {
                    light.style.transform = `translate(${mouseX - 200}px, ${mouseY - 200}px)`;
                }

                // Parallax effect on portal
                const portal = document.getElementById('portalCard');
                if (portal) {
                    const moveX = (mouseX - window.innerWidth / 2) / 50;
                    const moveY = (mouseY - window.innerHeight / 2) / 50;
                    portal.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });

            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);

                // Draw connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 130) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const opacity = 0.15 * (1 - dist / 130);
                            ctx.strokeStyle = `rgba(76, 175, 80, ${opacity})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }

                // Draw particles with glow effect
                for (let p of particles) {
                    const pulseVal = Math.sin(Date.now() * p.pulseSpeed + p.pulse) * 0.3;
                    const finalAlpha = Math.min(p.alpha + pulseVal, 0.9);

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius + 1, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(76, 175, 80, ${finalAlpha * 0.3})`;
                    ctx.fill();

                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#4caf50';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color === '#4caf50' ? `rgba(76, 175, 80, ${finalAlpha + 0.2})` : `rgba(129, 199, 132, ${finalAlpha + 0.1})`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function updateParticles() {
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Mouse interaction - particles avoid mouse
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 100) {
                        const angle = Math.atan2(dy, dx);
                        const force = (100 - dist) / 100 * 0.5;
                        p.x += Math.cos(angle) * force;
                        p.y += Math.sin(angle) * force;
                    }

                    if (p.x < -20) p.x = width + 20;
                    if (p.x > width + 20) p.x = -20;
                    if (p.y < -20) p.y = height + 20;
                    if (p.y > height + 20) p.y = -20;
                }
                drawParticles();
                requestAnimationFrame(updateParticles);
            }

            window.addEventListener('resize', () => { resizeCanvas(); });
            resizeCanvas();
            updateParticles();

            // Animated counter for members
            const membersElement = document.getElementById('statMembers');
            let currentMembers = 600;
            const targetMembers = 12400;

            function updateMembers() {
                if (currentMembers < targetMembers) {
                    currentMembers += Math.ceil((targetMembers - currentMembers) / 200);
                    if (currentMembers < 1000) {
                        membersElement.innerText = currentMembers;
                    } else {
                        membersElement.innerText = (currentMembers / 1000).toFixed(1) + 'k';
                    }
                    setTimeout(updateMembers, 50);
                } else {
                    membersElement.innerText = '12.4k+';
                }
            }
            setTimeout(updateMembers, 500);

            // Animate other stats
            const statNumbers = [
                { element: document.getElementById('statPosts'), target: 8200, current: 550, type: 'posts' },
                { element: document.getElementById('statGrowth'), target: 38, current: 38, type: 'growth' }
            ];

            function animateOtherStats() {
                statNumbers.forEach(stat => {
                    if (stat.type === 'posts') {
                        let interval = setInterval(() => {
                            if (stat.current < stat.target) {
                                stat.current += Math.ceil((stat.target - stat.current) / 100);
                                stat.element.innerText = (stat.current / 1000).toFixed(1) + 'k+';
                            } else {
                                stat.element.innerText = '8.2k+';
                                clearInterval(interval);
                            }
                        }, 20);
                    }
                });
            }
            setTimeout(animateOtherStats, 400);

            // Dynamic rotating messages
            const messages = [
                "✨ مساحة جديدة من الإبداع والتواصل الصافي",
                "🌿 حيث كل تفاعل يزهر بمعنى حقيقي",
                "🚀 انطلق مع مجتمع يواكب رؤيتك",
                "💬 تواصل بلا حدود.. تجربة Tribly الفريدة",
                "🎨 صمم حضورك الرقمي بأسلوب مختلف",
                "🏆 مجتمع ينمو معك كل يوم",
                "💚 بيئة آمنة وملهمة للجميع",
                "🌟 ابتكر وتألق مع Tribly"
            ];
            let msgIndex = 0;
            const msgDiv = document.getElementById('dynamicMessage');
            if (msgDiv) {
                setInterval(() => {
                    msgIndex = (msgIndex + 1) % messages.length;
                    msgDiv.style.opacity = '0';
                    msgDiv.style.transform = 'translateY(-5px)';
                    setTimeout(() => {
                        msgDiv.innerText = messages[msgIndex];
                        msgDiv.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                        msgDiv.style.opacity = '1';
                        msgDiv.style.transform = 'translateY(0)';
                    }, 200);
                }, 4500);
            }

            // Button click with enhanced effect
            const enterBtn = document.getElementById('enterButton');
            if (enterBtn) {
                enterBtn.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Create ripple effect
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple-effect');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.backgroundColor = 'rgba(255,255,255,0.8)';
                    ripple.style.width = '20px';
                    ripple.style.height = '20px';
                    ripple.style.transform = 'scale(0)';
                    ripple.style.transition = 'transform 0.6s ease-out, opacity 0.4s';
                    ripple.style.opacity = '1';
                    ripple.style.pointerEvents = 'none';
                    const rect = enterBtn.getBoundingClientRect();
                    ripple.style.left = `${rect.left + rect.width/2 - 10}px`;
                    ripple.style.top = `${rect.top + rect.height/2 - 10}px`;
                    ripple.style.position = 'fixed';
                    ripple.style.zIndex = '999';
                    document.body.appendChild(ripple);

                    setTimeout(() => {
                        ripple.style.transform = 'scale(80)';
                        ripple.style.opacity = '0';
                    }, 10);
                    setTimeout(() => ripple.remove(), 700);

                    enterBtn.innerHTML = `<span>جاري التوجيه...</span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 8v4l3 3"/></svg>`;
                    enterBtn.disabled = true;
                    enterBtn.style.opacity = '0.8';

                    setTimeout(() => {
                        window.location.href = "https://triblyapp.infinityfreeapp.com/";
                    }, 1200);
                });
            }

            // Floating leaves with better animation
            function addFloatingLeaves() {
                const leafContainer = document.createElement('div');
                leafContainer.style.position = 'fixed';
                leafContainer.style.top = 0;
                leafContainer.style.left = 0;
                leafContainer.style.width = '100%';
                leafContainer.style.height = '100%';
                leafContainer.style.pointerEvents = 'none';
                leafContainer.style.zIndex = '2';
                document.body.appendChild(leafContainer);

                for (let i = 0; i < 30; i++) {
                    let leaf = document.createElement('div');
                    leaf.style.position = 'absolute';
                    leaf.style.width = Math.random() * 12 + 6 + 'px';
                    leaf.style.height = Math.random() * 12 + 6 + 'px';
                    const greenColor = Math.random() > 0.6 ? '#4caf50' : '#81c784';
                    leaf.style.background = `linear-gradient(135deg, ${greenColor}, ${greenColor}aa)`;
                    leaf.style.borderRadius = '70% 0 60% 30%';
                    leaf.style.transform = `rotate(${Math.random() * 360}deg)`;
                    leaf.style.left = Math.random() * 100 + '%';
                    leaf.style.top = Math.random() * 100 + '%';
                    leaf.style.animation = `floatLeaf ${Math.random() * 12 + 8}s linear infinite`;
                    leaf.style.animationDelay = `${Math.random() * 5}s`;
                    leaf.style.opacity = '0.25';
                    leaf.style.filter = 'blur(1.5px)';
                    leafContainer.appendChild(leaf);
                }

                const styleSheet = document.createElement("style");
                styleSheet.textContent = `
                    @keyframes floatLeaf {
                        0% { transform: translateY(0vh) rotate(0deg); opacity: 0.25; }
                        100% { transform: translateY(-130vh) rotate(480deg); opacity: 0; }
                    }
                `;
                document.head.appendChild(styleSheet);
            }
            addFloatingLeaves();

            // Pulsing stats row effect
            const statsRowDiv = document.querySelector('.stats-row');
            if(statsRowDiv) {
                setInterval(() => {
                    statsRowDiv.style.transition = 'box-shadow 0.3s, border-color 0.3s';
                    statsRowDiv.style.boxShadow = '0 0 20px rgba(76,175,80,0.5)';
                    statsRowDiv.style.borderColor = 'rgba(76,175,80,0.7)';
                    setTimeout(() => {
                        statsRowDiv.style.boxShadow = '0 4px 20px rgba(0,0,0,0.05)';
                        statsRowDiv.style.borderColor = 'rgba(76,175,80,0.4)';
                    }, 500);
                }, 5000);
            }
        })();
    </script>
    <style>
        .ripple-effect {
            pointer-events: none;
            will-change: transform;
        }
        .enter-btn {
            position: relative;
            overflow: hidden;
        }
        #dynamicMessage {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .main-logo {
            transition: all 0.2s ease;
        }
        .portal {
            transition: transform 0.2s ease-out;
        }
    </style>
</body>
</html>
